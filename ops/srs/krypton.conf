# SRS (Simple Realtime Server) configuration for Krypton Vigil
#
# Deployment: /opt/srs/conf/krypton.conf on oj-vigil (10.1.235.155)
# Started via: systemctl start srs (see ../systemd/srs.service)
#
# Architecture (PROCTOR_MONITORING_DESIGN.md §4.3):
#   - Krypton clients push RTMP apps live-record / live-nodvr on the default
#     vhost. SRS only switches vhost when the URL carries `?vhost=...`.
#   - live-record streams should be kept as DVR mp4; live-nodvr streams remain
#     volatile and are discarded by the on_dvr callback.
#   - HLS served on :8080, served upstream to oj via Caddy reverse_proxy
#   - DVR mp4 playback expects ./objs/nginx/html/recordings to symlink to
#     /data/vigil/recordings; see ops/PROCTOR_DEPLOYMENT.md.
#   - http_hooks call vigil-server on publish / unpublish / play / dvr
#
# Network: RTMP is intended for the lab LAN. Do not use SRS `refer` for this:
# it validates RTMP pageUrl/referer, not client IP, and Qt/FFmpeg publishers
# send an empty pageUrl.

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        file;
srs_log_file        /var/log/srs.log;
srs_log_level       info;
pid                 /var/run/srs.pid;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
    crossdomain     on;
}

http_api {
    enabled         on;
    listen          127.0.0.1:1985;
}

stats {
    network         0;
}

# Default vhost.
#
# RTMP URLs such as `rtmp://host/live-record/<stream>` use:
#   vhost = __defaultVhost__
#   app   = live-record
#   stream = <stream>
#
# SRS `dvr_apply` accepts `all` or exact `<app>/<stream>` keys, not an app-only
# filter. We enable DVR for this vhost and let the Vigil callback persist only
# streams whose app is live-record and whose contest still has recording enabled.
vhost __defaultVhost__ {
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    2;
        hls_window      30;
        hls_dispose     30;
    }
    dvr {
        enabled         on;
        dvr_apply       all;
        dvr_plan        session;
        dvr_path        /data/vigil/recordings/[stream]_[2006][01][02]_[15][04][05].mp4;
        dvr_duration    1800;
        dvr_wait_keyframe on;
    }
    http_hooks {
        enabled         on;
        on_publish      http://127.0.0.1:8765/api/internal/srs/on_publish;
        on_unpublish    http://127.0.0.1:8765/api/internal/srs/on_unpublish;
        on_play         http://127.0.0.1:8765/api/internal/srs/on_play;
        on_dvr          http://127.0.0.1:8765/api/internal/srs/on_dvr;
    }
}
