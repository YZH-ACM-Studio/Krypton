# SRS (Simple Realtime Server) configuration for Krypton Vigil
#
# Deployment: /opt/srs/conf/krypton.conf on oj-vigil (10.1.235.155)
# Started via: systemctl start srs (see ../systemd/srs.service)
#
# Architecture (PROCTOR_MONITORING_DESIGN.md §4.3):
#   - Two vhosts: live-record (dvr ON) and live-nodvr (dvr OFF)
#   - Clients push to one based on contest.recordEnabled
#   - HLS served on :8080, served upstream to oj via Caddy reverse_proxy
#   - http_hooks call vigil-server on publish / unpublish / play / dvr
#
# Network: IP whitelist (10.1.0.0/16) — RTMP push only accepted from lab LAN.

listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        file;
srs_log_file        /var/log/srs.log;
srs_log_level       info;
pid                 /var/run/srs.pid;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
    crossdomain     on;
}

http_api {
    enabled         on;
    listen          127.0.0.1:1985;
}

stats {
    network         0;
}

# Default vhost — should never be hit (clients always specify live-record / live-nodvr).
vhost __defaultVhost__ {
}

# Application: live-record
#   Used when contest.recordEnabled = true. SRS writes mp4 segments to
#   /data/vigil/recordings/. Vigil server is notified via on_dvr callback.
vhost live-record {
    refer {
        enabled     on;
        all         10.1.0.0/16;
    }
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    2;
        hls_window      30;
        hls_dispose     30;
    }
    dvr {
        enabled         on;
        dvr_plan        session;
        dvr_path        /data/vigil/recordings/[stream]_[20060102_150405].mp4;
        dvr_duration    1800;
        dvr_wait_keyframe on;
    }
    http_hooks {
        enabled         on;
        on_publish      http://127.0.0.1:8765/api/internal/srs/on_publish;
        on_unpublish    http://127.0.0.1:8765/api/internal/srs/on_unpublish;
        on_play         http://127.0.0.1:8765/api/internal/srs/on_play;
        on_dvr          http://127.0.0.1:8765/api/internal/srs/on_dvr;
    }
}

# Application: live-nodvr
#   Used when contest.recordEnabled = false. No dvr — stream is volatile.
vhost live-nodvr {
    refer {
        enabled     on;
        all         10.1.0.0/16;
    }
    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    2;
        hls_window      30;
        hls_dispose     30;
    }
    http_hooks {
        enabled         on;
        on_publish      http://127.0.0.1:8765/api/internal/srs/on_publish;
        on_unpublish    http://127.0.0.1:8765/api/internal/srs/on_unpublish;
        on_play         http://127.0.0.1:8765/api/internal/srs/on_play;
    }
}
